# ─────────────────────────────────────────────────────────────────────────────
# GPS51 Fleet Tracker — Nginx config
#
# Multi-tenant: each workspace gets its own subdomain:
#   acme.fleettracker.app  → serves the same SPA
#   The x-tenant-slug header is forwarded to FastAPI automatically.
#
# Setup:
#   1. Replace "fleettracker.app" with your actual domain everywhere below.
#   2. Add a wildcard DNS A record:  *.fleettracker.app → your server IP
#   3. Obtain a wildcard SSL cert with Certbot:
#        certbot certonly --nginx -d fleettracker.app -d *.fleettracker.app
#   4. sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    server_name fleettracker.app *.fleettracker.app;
    return 301 https://$host$request_uri;
}

# Main HTTPS server — wildcard subdomain support
server {
    listen 443 ssl http2;
    server_name fleettracker.app *.fleettracker.app;

    # Wildcard SSL certificate (from Certbot or your CA)
    ssl_certificate     /etc/letsencrypt/live/fleettracker.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleettracker.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/gps51-fleet/frontend/dist;
    index index.html;

    # ── React SPA ──────────────────────────────────────────
    # All non-API routes serve index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → FastAPI (port 8001) ───────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        # Forward the original Host header so TenantMiddleware can extract
        # the subdomain (e.g. "acme" from "acme.fleettracker.app")
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Health check (public)
    location /health {
        proxy_pass       http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # ── Static assets — aggressive cache ──────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "same-origin"  always;
}
